global:
  hosts:
    domain: localhost
    https: false
    gitlab:
      name: localhost
  ingress:
    enabled: false
    configureCertmanager: false
  edition: ce

certmanager-issuer:
  email: admin@localhost

certmanager:
  install: false

nginx-ingress:
  enabled: false

prometheus:
  install: false

gitlab-runner:
  install: false

registry:
  enabled: true

gitlab:
  webservice:
    replicaCount: 1
  sidekiq:
    replicaCount: 1
  gitaly:
    persistence:
      size: 5Gi

redis:
  image:
    registry: quay.io
    repository: bitnami/redis
    tag: 6.2.7-debian-11-r11
  metrics:
    image:
      registry: quay.io
      repository: bitnami/redis-exporter
      tag: 1.43.0-debian-11-r4
  architecture: standalone

postgresql:
  image:
    registry: quay.io
    repository: bitnami/postgresql
    tag: 14.8.0
  metrics:
    image:
      registry: quay.io
      repository: bitnami/postgres-exporter
      tag: 0.12.0-debian-11-r86
